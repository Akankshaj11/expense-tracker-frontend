<!-- Repo file header -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="theme-color" content="#1746A2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PocketFlow" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>PocketFlow</title>
    <script>
      window.deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredInstallPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-installable'));
      });
    </script>
  </head>
  <body>
    <script>
      (function() {
        try {
          const currentUserStr = localStorage.getItem('currentUser');
          let savedTheme = 'light';
          if (currentUserStr) {
            const currentUser = JSON.parse(currentUserStr);
            if (currentUser && currentUser.email) {
              savedTheme = localStorage.getItem('selectedTheme_' + currentUser.email) || 'light';
            }
          }
          const path = window.location.pathname;
          const isInnerRoute =
            path === '/dashboard' ||
            path === '/transactions' ||
            path.indexOf('/module/') === 0 ||
            path === '/manage-organization' ||
            path.indexOf('/edit-transaction/') === 0 ||
            path === '/add-transaction';

          if (isInnerRoute && savedTheme === 'dark') {
            document.body.classList.remove('theme-light-violet');
            document.body.classList.add('dark');
          } else {
            document.body.classList.add('theme-light-violet');
            document.body.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
